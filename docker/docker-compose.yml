version: '3.8'

services:
  # Python FastAPI Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: monitoring-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - LOG_FILE=/app/logs/app.log
      - APP_NAME=log-monitoring-backend
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:8080
      - ENABLE_METRICS=true
      - CURRENT_TIME=2026-05-26T02:05:48+05:30
    volumes:
      - shared-logs:/app/logs
    restart: unless-stopped

  # React Vite Frontend served via Nginx
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: monitoring-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # Prometheus for scraping metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - backend
    restart: unless-stopped

  # Loki for log aggregation
  loki:
    image: grafana/loki:2.9.0
    container_name: monitoring-loki
    ports:
      - "3100:3100"
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # Fluent Bit log shipper
  fluent-bit:
    image: fluent/fluent-bit:3.0
    container_name: monitoring-fluentbit
    volumes:
      - ../monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - shared-logs:/var/log/app:ro
    depends_on:
      - loki
      - backend
    restart: unless-stopped

  # Grafana dashboard visualizing metrics and logs
  grafana:
    image: grafana/grafana:latest
    container_name: monitoring-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ../monitoring/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ../monitoring/grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ../monitoring/grafana/dashboards/dashboard.json:/etc/grafana/dashboards/dashboard.json
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  shared-logs:
    driver: local
