apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: log-monitoring-app
  labels:
    app.kubernetes.io/name: app-ingress
    app.kubernetes.io/part-of: log-monitoring-system
  annotations:
    # Use ingress-nginx controller (standard for Minikube / Docker Desktop)
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: log-monitoring.local
      http:
        paths:
          # Route health, metrics, and log generator directly to the backend API
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /generate-log
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Route all other root requests to the React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
