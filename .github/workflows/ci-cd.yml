name: DevOps Observability Pipeline CI/CD
permissions:
  contents: read
  packages: write
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Validation and Linting of Frontend and Backend codebases
  lint-and-test:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Backend Validation
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Lint Backend Code (Ruff)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          ruff check backend/ --select=E9,F63,F7,F82 --show-source
          # Run general formatting/lint check (warning level)
          ruff check backend/ || true

      # Frontend Validation
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Check Frontend ESLint Checks
        working-directory: ./frontend
        run: npm run lint || echo "ESLint warnings found, but proceeding."

  # Job 2: Multi-platform Docker Image Building (supports AMD64 and ARM64/Apple Silicon)
  build-and-tag-images:
    name: Build & Tag Container Images
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Set up build engine for multi-architecture builds
      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Tag Backend Container
      - name: Build and Tag Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true # Set to true once logged into a registry (e.g. AWS ECR)
          tags:  |
           ghcr.io/rahulkumar-workspace/log-monitoring-backend:latest
           ghcr.io/rahulkumar-workspace/log-monitoring-backend:${{ github.sha }}

      # Build and Tag Frontend Container
      - name: Build and Tag Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true # Set to true once logged into a registry
          tags:  |
           ghcr.io/rahulkumar-workspace/log-monitoring-frontend:latest
           ghcr.io/rahulkumar-workspace/log-monitoring-frontend:${{ github.sha }}

  # Job 3: Placeholder Deployment (Simulating CD target rollouts)
  deploy:
    name: Deploy to Environment (Placeholder)
    runs-on: ubuntu-latest
    needs: build-and-tag-images
    environment: staging

