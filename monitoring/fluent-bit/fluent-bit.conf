[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name             tail
    Path             /var/log/app/*.log
    Parser           json
    Tag              backend.logs
    Refresh_Interval 2
    Mem_Buf_Limit    5MB
    Skip_Long_Lines  On
    # Start scanning from the head of the file
    Read_from_Head   true

[OUTPUT]
    Name   loki
    Match  backend.logs
    Host   loki
    Port   3100
    Labels job=log-monitoring-backend
