apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../monitoring
  - ../../ingress

# -----------------------------------------------------------------
# Production Image Overrides
# -----------------------------------------------------------------
# These point to GitHub Container Registry (GHCR).
# The CI/CD pipeline dynamically updates the tag with `kustomize edit set image`
# before applying, so you will see the SHA-tagged image in the running cluster.
#
# To set your own repo, replace OWNER/REPO below:
#   ghcr.io/<github-username>/<repo-name>/backend:latest
#
# The `latest` tag here is a fallback — CI always pins to a commit SHA tag.
images:
  - name: backend
    newName: ghcr.io/OWNER/log-monitoring-system/backend
    newTag: latest
  - name: frontend
    newName: ghcr.io/OWNER/log-monitoring-system/frontend
    newTag: latest

# Production Patches:
# Increase resource limits and scale replicas for production load.
patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-deployment
        namespace: log-monitoring-app
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: backend
                resources:
                  requests:
                    cpu: "250m"
                    memory: "256Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
    target:
      kind: Deployment
      name: backend-deployment
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend-deployment
        namespace: log-monitoring-app
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: frontend-deployment
